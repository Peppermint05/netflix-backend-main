name: build and push docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          ls -al

      - name: Docker build
        run: |
          docker build -t netflix-backend-main:latest .